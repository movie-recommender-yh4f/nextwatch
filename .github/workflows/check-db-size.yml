name: Supabase DB Size Check

on:
  schedule:
    - cron: '0 8 * * 1'  
  workflow_dispatch:

jobs:
  check-size:
    runs-on: ubuntu-latest

    steps:
      - name: Check Supabase database size
        id: dbsize
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          OUTPUT=$(psql "$SUPABASE_DB_URL" -t -A -c "
            SELECT json_build_object(
              'total_mb', ROUND(SUM(pg_total_relation_size(schemaname || '.' || tablename)) / 1024.0 / 1024.0, 2),
              'free_tier_mb', 500,
              'used_pct', ROUND(SUM(pg_total_relation_size(schemaname || '.' || tablename)) / 1024.0 / 1024.0 / 500.0 * 100, 1),
              'tables', json_agg(
                json_build_object(
                  'schema', schemaname,
                  'table', tablename,
                  'size', pg_size_pretty(pg_total_relation_size(schemaname || '.' || tablename))
                ) ORDER BY pg_total_relation_size(schemaname || '.' || tablename) DESC
              )
            )
            FROM pg_tables
            WHERE schemaname IN ('public', 'auth', 'storage');
          ")

          TOTAL=$(echo "$OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total_mb'])")
          PCT=$(echo "$OUTPUT"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['used_pct'])")

          echo "total_mb=$TOTAL" >> $GITHUB_OUTPUT
          echo "used_pct=$PCT"   >> $GITHUB_OUTPUT
          echo "raw_output=$OUTPUT" >> $GITHUB_OUTPUT

          echo "### DB Size Report" >> $GITHUB_STEP_SUMMARY
          echo "- **Total used:** ${TOTAL} MB / 500 MB" >> $GITHUB_STEP_SUMMARY
          echo "- **Used percentage:** ${PCT}%" >> $GITHUB_STEP_SUMMARY

      - name: Warn if over 80%
        if: ${{ fromJson(steps.dbsize.outputs.used_pct) >= 80 }}
        run: |
          echo "::warning::Database is at ${{ steps.dbsize.outputs.used_pct }}% capacity (>= 80%)!"
          exit 1