name: Supabase DB Size Check

on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:

jobs:
  check-size:
    runs-on: ubuntu-latest

    steps:
      - name: Check Supabase database size
        id: dbsize
        env:
          SUPABASE_URL: https://lbqirthnytacrlqabtsw.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          RESULT=$(curl -s -X POST \
            "$SUPABASE_URL/rest/v1/rpc/get_db_size" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json")

          echo "Raw result: $RESULT"

          TOTAL=$(echo "$RESULT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['total_mb'])")
          PCT=$(echo "$RESULT"   | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['used_pct'])")

          echo "total_mb=$TOTAL" >> $GITHUB_OUTPUT
          echo "used_pct=$PCT"   >> $GITHUB_OUTPUT

          echo "### DB Size Report" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Used | ${TOTAL} MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Free tier | 500 MB |" >> $GITHUB_STEP_SUMMARY
          echo "| Precentage | ${PCT}% |" >> $GITHUB_STEP_SUMMARY

      - name: Warn if over 80%
        if: ${{ fromJson(steps.dbsize.outputs.used_pct) >= 80 }}
        run: |
          echo "::error::Baza je na ${{ steps.dbsize.outputs.used_pct }}% kapaciteta!"
          exit 1
